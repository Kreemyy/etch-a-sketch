<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Etch-a-Sketch</title>
  </head>
  <body>
    <h2 class="title">ETCH-A-SKETCH</h2>
    <div class="controls">
      <button class="grid-size-btn">Change Grid Size</button>
      <label class="color-label"
        ><span>Pick Color:</span>
        <input type="color" class="color-input" />
      </label>
      <button class="random-color-btn">Random Colors</button>
      <button class="clear-sketch">Clear Sketch</button>
    </div>
    <div class="grid-container js-grid-container"></div>

    <script src="etch-a-sketch.js"></script>
  </body>
</html>
